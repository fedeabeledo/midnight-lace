                            $ref: "#/components/schemas/SolicitudCrearCuentaCobro"
            responses:
                "201":
                    description: Cuenta de cobro creada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CuentaCobro"
                "400":
                    description: Datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: El usuario no tiene rol de dueño
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"

    /duenio/cuentas-cobro/{id}:
        delete:
