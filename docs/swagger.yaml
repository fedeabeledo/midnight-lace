                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

    # ============================================================
    # SUBASTAS — Comprador (lectura)
    # ============================================================
    /subastas:
        get:
            tags: [Subastas]
            summary: Listar todas las subastas
            description: >
                **Rol requerido: comprador.**
                Devuelve todas las subastas sin restricción de categoría. Cualquier comprador
                registrado puede ver todas las subastas. La categoría solo determina si puede
                operar (pujar, conectarse por WS) en cada una.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
                - name: estado
                  in: query
                  required: false
                  schema:
                      type: string
                      enum: [programada, abierta, cerrada]
                - name: categoria
                  in: query
                  required: false
                  description: Filtro opcional por categoría de subasta.
                  schema:
                      type: string
                      enum: [comun, especial, plata, oro, platino]
                - name: moneda
                  in: query
                  required: false
                  schema:
                      type: string
                      enum: [ARS, USD]
            responses:
                "200":
                    description: Lista de subastas
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Subasta"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /subastas/{id}:
        get:
            tags: [Subastas]
            summary: Ver detalle de una subasta
            description: >
                **Rol requerido: comprador.**
                Accesible para cualquier comprador registrado sin importar su categoría.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            responses:
                "200":
                    description: Detalle de la subasta
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Subasta"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "404":
                    description: Subasta no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

    /subastas/{id}/catalogo:
        get:
            tags: [Subastas]
            summary: Ver catálogo de una subasta
            description: >
                **Rol requerido: comprador.**
                El catálogo es público, pero el precioBase de cada ítem solo se muestra
                si el comprador está admitido (admitido = 'si').
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
            responses:
                "200":
                    description: Catálogo de la subasta
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        $ref: "#/components/schemas/Catalogo"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "404":
                    description: Subasta no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

    /subastas/{id}/item-actual:
        get:
            tags: [Subastas]
            summary: Ver ítem en subasta actualmente y mejor oferta
            description: >
                **Rol requerido: comprador.**
                Devuelve el ítem que está siendo subastado en este momento, la mejor
                oferta actual y los límites válidos de puja. Usar como fallback al
                reconectarse por WebSocket para obtener el estado actual sin esperar
                el próximo evento. La conexión WS es el canal principal de tiempo real.
                Ver websockets.md para el flujo completo.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            responses:
                "200":
                    description: Ítem actual y estado de las ofertas
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EstadoPujaActual"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "404":
                    description: Subasta no encontrada o no está en curso
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

    # ============================================================
    # PUJAS — Comprador
    # ============================================================
    /subastas/{idSubasta}/items/{idItem}/pujas:
        get:
            tags: [Pujas]
            summary: Ver historial de pujas de un ítem
            description: >
                **Rol requerido: comprador.**
                Devuelve todas las pujas del ítem ordenadas cronológicamente.
            security:
                - bearerAuth: []
            parameters:
                - name: idSubasta
                  in: path
                  required: true
                  schema:
                      type: integer
                - name: idItem
                  in: path
                  required: true
                  schema:
                      type: integer
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
            responses:
                "200":
                    description: Historial de pujas ordenado cronológicamente
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Puja"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "404":
                    description: Subasta o ítem no encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

        post:
            tags: [Pujas]
            summary: Realizar una puja
            description: >
                **Rol requerido: comprador.**
                El comprador debe haberse conectado previamente a la subasta por WebSocket,
                lo cual registra automáticamente su asistencia y le asigna un numeroPostor.
                Sin ese registro en la tabla asistentes, el backend rechaza la puja con 403.


                Validaciones aplicadas por el backend:

                - El comprador debe tener al menos un medio de pago verificado.
                - La categoría de la subasta debe ser menor o igual a la del comprador.
                - El monto debe ser mayor a la última oferta más el 1% del precio base.
                - El monto no puede superar la última oferta más el 20% del precio base,
                  excepto en subastas de categoría oro o platino (sin límite superior).
                - Si el medio de pago es cheque certificado, el montoDisponible debe alcanzar.
                - El ítem debe estar activo en ese momento (es el turno de ese ítem).
                - El backend no acepta otra puja hasta confirmar que la anterior fue registrada (409).
                - El comprador no puede tener multas impagas.
            security:
                - bearerAuth: []
            parameters:
                - name: idSubasta
                  in: path
                  required: true
                  schema:
                      type: integer
                - name: idItem
                  in: path
                  required: true
                  schema:
                      type: integer
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudCrearPuja"
            responses:
                "201":
                    description: Puja registrada correctamente
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Puja"
                "400":
                    description: Monto fuera de los límites permitidos o datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Sin medio de pago verificado, categoría insuficiente o multa impaga
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Subasta o ítem no encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: Hay una puja en proceso de confirmación. Intentá de nuevo en unos instantes.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ============================================================
    # MI ACTIVIDAD — Comprador
    # ============================================================
    /mi/subastas:
        get:
            tags: [Mi actividad]
            summary: Subastas en las que participó el comprador autenticado
            description: >
                **Rol requerido: comprador.**
                Se infiere por quién realizó pujas.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
            responses:
                "200":
                    description: Lista de subastas con participación del comprador
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Subasta"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /mi/pujas:
        get:
            tags: [Mi actividad]
            summary: Historial de pujas del comprador autenticado
            description: >
                **Rol requerido: comprador.**
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
                - name: idItem
                  in: query
                  required: false
                  schema:
                      type: integer
                  description: Filtrar por ítem específico
            responses:
                "200":
                    description: Historial de pujas
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Puja"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /mi/compras:
        get:
            tags: [Mi actividad]
            summary: Compras realizadas por el comprador autenticado
            description: >
                **Rol requerido: comprador.**
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
            responses:
                "200":
                    description: Lista de registros de compra
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/RegistroDeSubasta"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /mi/compras/{id}:
        patch:
            tags: [Mi actividad]
            summary: Indicar si se retira personalmente un artículo comprado
            description: >
                **Rol requerido: comprador.**
                Permite al comprador indicar si va a retirar el artículo en persona.
                Si `retiraPersonalmente` es true, el comprador pierde la cobertura
                del seguro sobre ese bien. No se puede revertir una vez confirmado.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [retiraPersonalmente]
                            properties:
                                retiraPersonalmente:
                                    type: boolean
            responses:
                "200":
                    description: Registro de compra actualizado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RegistroDeSubasta"
                "400":
                    description: Datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: La compra no pertenece al comprador autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Registro de compra no encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: El retiro ya fue confirmado y no puede revertirse
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /mi/compras/{id}/pagar:
        post:
            tags: [Mi actividad]
            summary: Pagar una compra ganada
            description: >
                **Rol requerido: comprador.**
                El comprador elige el medio de pago con el que abona la compra.
                El medio debe estar verificado, activo y pertenecer al comprador autenticado.
                Si es cheque certificado, se descuenta del montoDisponible.
                Al procesarse exitosamente, se marca el registro como pagado (pagado = true).
                Si la subasta era en dólares, solo se aceptan medios de pago en USD.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudPago"
            responses:
                "200":
                    description: Pago registrado correctamente
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RegistroDeSubasta"
                "400":
                    description: Medio de pago inválido, inactivo o sin fondos suficientes
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: La compra no pertenece al comprador autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Registro de compra no encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: La compra ya fue pagada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /mi/multas:
        get:
            tags: [Mi actividad]
            summary: Multas del comprador autenticado
            description: >
                **Rol requerido: comprador.**
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
            responses:
                "200":
                    description: Lista de multas
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Multa"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /mi/multas/{id}/pagar:
        post:
            tags: [Mi actividad]
            summary: Pagar una multa propia
            description: >
                **Rol requerido: comprador.**
                El comprador elige el medio de pago con el que abona la multa.
                El medio debe estar verificado, activo y pertenecer al comprador autenticado.
                Si es cheque certificado, se descuenta del montoDisponible.
                Al procesarse exitosamente, la multa queda marcada como pagada
                y el comprador recupera el acceso a pujar en subastas.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudPago"
            responses:
                "200":
                    description: Multa pagada correctamente
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Multa"
                "400":
                    description: Medio de pago inválido, inactivo o sin fondos suficientes
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: La multa no pertenece al comprador autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Multa no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: La multa ya estaba pagada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /mi/metricas:
        get:
            tags: [Mi actividad]
            summary: Métricas de participación del comprador autenticado
            description: >
                **Rol requerido: comprador.**
            security:
                - bearerAuth: []
            responses:
                "200":
                    description: Métricas del comprador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MetricasCliente"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /mi/notificaciones:
        get:
            tags: [Mi actividad]
            summary: Notificaciones del usuario autenticado
            description: >
                **Rol requerido: comprador o dueño.**
                Devuelve todas las notificaciones del usuario ordenadas por fecha descendente.
                Incluye notificaciones de compras ganadas (rol comprador) y de productos
                vendidos, aceptados, rechazados o devueltos (rol dueño).
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
                - name: leida
                  in: query
                  required: false
                  schema:
                      type: boolean
                  description: Filtrar por estado de lectura.
            responses:
                "200":
                    description: Lista de notificaciones
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Notificacion"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"

    /mi/notificaciones/{id}:
        patch:
            tags: [Mi actividad]
            summary: Marcar una notificación como leída
            description: >
                **Rol requerido: comprador o dueño.**
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [leida]
                            properties:
                                leida:
                                    type: boolean
            responses:
                "200":
                    description: Notificación actualizada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Notificacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: La notificación no pertenece al usuario autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Notificación no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

    # ============================================================
    # SUBASTADOR
    # ============================================================
    /subastador/subastas:
        get:
            tags: [Subastador]
            summary: Listar todas las subastas (vista subastador)
            description: >
                **Rol requerido: subastador.**
                Sin restricción de categoría. Ve todas las subastas.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
                - name: estado
                  in: query
                  required: false
                  schema:
                      type: string
                      enum: [programada, abierta, cerrada]
            responses:
                "200":
                    description: Lista de subastas
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Subasta"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"

        post:
            tags: [Subastador]
            summary: Crear una subasta
            description: >
                **Rol requerido: subastador.**
                La fecha debe ser al menos 10 días posterior a la creación.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudCrearSubasta"
            responses:
                "201":
                    description: Subasta creada con estado "programada"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Subasta"
                "400":
                    description: Datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"

    /subastador/subastas/{id}:
        patch:
            tags: [Subastador]
            summary: Actualizar una subasta
            description: >
                **Rol requerido: subastador.**
                Solo se puede modificar mientras el estado sea "programada".
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudActualizarSubasta"
            responses:
                "200":
                    description: Subasta actualizada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Subasta"
                "400":
                    description: Datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Subasta no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: No se puede modificar una subasta que no está en estado "programada"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /subastador/subastas/{id}/estado:
        patch:
            tags: [Subastador]
            summary: Cambiar el estado de una subasta
            description: >
                **Rol requerido: subastador.**
                Permite avanzar el estado manualmente: programada → abierta → cerrada.
                El avance automático entre ítems lo maneja el backend según duracionItemMinutos.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [estado]
                            properties:
                                estado:
                                    type: string
                                    enum: [abierta, cerrada]
            responses:
                "200":
                    description: Estado actualizado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Subasta"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Subasta no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: Transición de estado inválida
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /subastador/subastas/{id}/registros:
        get:
            tags: [Subastador]
            summary: Ver registros de venta de una subasta
            description: >
                **Rol requerido: subastador.**
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
            responses:
                "200":
                    description: Registros de venta de la subasta
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/RegistroDeSubasta"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Subasta no encontrada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"

    /subastador/catalogos:
        post:
            tags: [Subastador]
            summary: Crear un catálogo y asignarlo a una subasta
            description: >
                **Rol requerido: subastador.**
                Solo el subastador asignado a la subasta puede crear su catálogo.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudCrearCatalogo"
            responses:
                "201":
                    description: Catálogo creado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Catalogo"
                "400":
                    description: Datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"

    /subastador/catalogos/{id}/items:
        post:
            tags: [Subastador]
            summary: Agregar un ítem al catálogo desde el pool
            description: >
                **Rol requerido: subastador.**
                El producto debe estar en estado "asignado" y pertenecer al pool del subastador autenticado.
                No se puede agregar el mismo producto dos veces al mismo catálogo.
                Al agregarlo, el subastador define la `comision`. El precio base es el que
                fijó el dueño al cargar el producto. El backend
                actualiza el `estadoProducto` a "pendiente_confirmacion" y crea una notificación
                `producto_aceptado` al dueño con la fecha, hora, lugar, precio base y comisiones
                de la subasta. El producto no puede subastarse hasta que el dueño confirme
                las condiciones via `PATCH /productos/{id}/aceptar-condiciones`.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pathId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SolicitudAgregarItemCatalogo"
            responses:
                "201":
                    description: Ítem agregado al catálogo
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ItemCatalogo"
                "400":
                    description: Datos inválidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorValidacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador o el producto no pertenece al pool del subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Catálogo o producto no encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: El producto ya está en el catálogo
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /subastador/catalogos/{idCatalogo}/items/{idItem}:
        delete:
            tags: [Subastador]
            summary: Quitar un ítem del catálogo
            description: >
                **Rol requerido: subastador.**
                Solo es posible mientras la subasta esté en estado "programada".
            security:
                - bearerAuth: []
            parameters:
                - name: idCatalogo
                  in: path
                  required: true
                  schema:
                      type: integer
                - name: idItem
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                "204":
                    description: Ítem eliminado del catálogo
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
                    description: Catálogo o ítem no encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoEncontrado"
                "409":
                    description: No se puede modificar el catálogo de una subasta que ya no está programada
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /subastador/productos:
        get:
            tags: [Subastador]
            summary: Listar el pool de productos del subastador autenticado
            description: >
                **Rol requerido: subastador.**
                Devuelve los productos asignados al subastador autenticado.
                Los productos en estado "asignado" están disponibles para agregar a un catálogo.
            security:
                - bearerAuth: []
            parameters:
                - $ref: "#/components/parameters/pagina"
                - $ref: "#/components/parameters/cantidad"
                - name: estado
                  in: query
                  required: false
                  schema:
                      type: string
                      enum:
                          [
                              asignado,
                              pendiente_confirmacion,
                              en_subasta,
                              vendido,
                          ]
            responses:
                "200":
                    description: Lista de productos del pool
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    datos:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Producto"
                                    meta:
                                        $ref: "#/components/schemas/MetaPaginacion"
                "401":
                    description: No autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: Requiere rol subastador
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"

