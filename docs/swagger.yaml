                            schema:
                                $ref: "#/components/schemas/ErrorNoAutenticado"
                "403":
                    description: La cuenta no pertenece al dueño autenticado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorSinPermiso"
                "404":
